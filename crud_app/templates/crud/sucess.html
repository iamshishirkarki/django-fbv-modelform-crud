<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#4CAF50,#2E7D32);
    }

    .success-card{
      background:#fff;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:350px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      animation:fadeIn 0.6s ease;
    }

    .checkmark{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#4CAF50;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 auto 20px;
      color:#fff;
      font-size:50px;
      font-weight:bold;
    }

    h1{
      color:#2E7D32;
      margin-bottom:10px;
    }

    p{
      color:#555;
      margin-bottom:25px;
      line-height:1.5;
    }

    .btn{
      display:inline-block;
      padding:12px 25px;
      background:#4CAF50;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      transition:0.3s;
    }

    .btn:hover{
      background:#388E3C;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="success-card">
    <div class="checkmark">✓</div>
    <h1>Success!</h1>
    <p>Your action has been completed successfully.</p>
    <a href="{% url 'add_and_show' %}" class="btn">Continue</a>
  </div>

</body>
</html>
